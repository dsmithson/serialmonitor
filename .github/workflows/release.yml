name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

jobs:
  release:
    name: Build & Publish
    runs-on: ubuntu-latest

    permissions:
      contents: write   # create GitHub releases and upload assets

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so GitHub can generate accurate changelogs

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      # ── Binary artifacts ──────────────────────────────────────
      - name: Build binaries
        run: |
          mkdir -p dist
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 \
            go build -ldflags="-s -w" -o dist/serialmonitor-linux-amd64 ./cmd/serialmonitor
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 \
            go build -ldflags="-s -w" -o dist/serialmonitor-linux-arm64 ./cmd/serialmonitor

      - name: Generate checksums
        run: |
          cd dist
          sha256sum serialmonitor-linux-amd64 serialmonitor-linux-arm64 > checksums.txt
          cat checksums.txt

      # ── Multi-arch Docker image ───────────────────────────────
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Produces tags:  dsmithson/serialmonitor:1.2.3
      #                 dsmithson/serialmonitor:1.2
      #                 dsmithson/serialmonitor:latest
      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: dsmithson/serialmonitor
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── GitHub Release ────────────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true   # auto-generates "What's Changed" from merged PRs
          files: |
            dist/serialmonitor-linux-amd64
            dist/serialmonitor-linux-arm64
            dist/checksums.txt
