<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Serial Monitor</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="xterm.css" />
</head>
<body>
  <header>
    <h1>Serial Monitor</h1>
    <nav>
      <button class="tab-btn active" data-tab="stream">Live Stream</button>
      <button class="tab-btn" data-tab="terminal">Terminal</button>
      <button class="tab-btn" data-tab="config">Configuration</button>
    </nav>
  </header>

  <!-- ── LIVE STREAM ──────────────────────────────────────── -->
  <section id="tab-stream" class="tab active">
    <div class="stream-toolbar">
      <div id="stream-legend" class="legend"></div>
      <div class="stream-controls">
        <label class="checkbox-label">
          <input type="checkbox" id="stream-autoscroll" checked /> Auto-scroll
        </label>
        <button id="stream-save">Save Log</button>
        <button id="stream-clear">Clear</button>
      </div>
    </div>
    <div id="stream-filters" class="filter-bar"></div>
    <div id="stream-output" class="output-panel"></div>
  </section>

  <!-- ── TERMINAL ─────────────────────────────────────────── -->
  <section id="tab-terminal" class="tab">
    <div class="terminal-container">
      <div class="term-port-tabs" id="term-port-tabs">
        <div class="term-port-tabs-label">Ports</div>
        <!-- populated dynamically -->
      </div>
      <div class="term-right-pane">
        <div class="term-xterm-toolbar">
          <button id="term-save">Save Log</button>
        </div>
        <div class="term-xterminals" id="term-xterminals">
          <!-- one xterm wrapper per port, shown/hidden -->
        </div>
      </div>
    </div>
  </section>

  <!-- ── CONFIGURATION ────────────────────────────────────── -->
  <section id="tab-config" class="tab">
    <div class="config-toolbar">
      <button id="cfg-scan">Scan for devices</button>
      <button id="cfg-save-all">Save Changes</button>
      <span class="cfg-sep"></span>
      <label class="settings-label">Stream buffer:
        <input type="number" id="cfg-buffer-size" min="0" max="10000" step="50" value="300" />
        <span class="settings-hint">lines (0 = off)</span>
      </label>
    </div>
    <div id="cfg-message" class="cfg-message hidden"></div>
    <table id="cfg-table">
      <thead>
        <tr>
          <th class="grip-th"></th>
          <th>Device</th>
          <th>Name</th>
          <th>Baud</th>
          <th>Data bits</th>
          <th>Parity</th>
          <th>Stop bits</th>
          <th>Color</th>
          <th>Enabled</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="cfg-tbody"></tbody>
    </table>

    <div id="cfg-add-panel" class="add-panel hidden">
      <h3>Add device</h3>
      <div id="cfg-available-list" class="available-list"></div>
    </div>
  </section>

  <script src="xterm.min.js"></script>
  <script src="xterm-addon-fit.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
