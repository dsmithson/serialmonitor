apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "serialmonitor.fullname" . }}
  labels:
    {{- include "serialmonitor.labels" . | nindent 4 }}
spec:
  replicas: 1   # Must be 1 — serial ports are exclusive resources
  selector:
    matchLabels:
      {{- include "serialmonitor.selectorLabels" . | nindent 6 }}
  strategy:
    type: Recreate  # Ensures old pod releases devices before new pod starts
  template:
    metadata:
      labels:
        {{- include "serialmonitor.selectorLabels" . | nindent 8 }}
    spec:
      {{- if .Values.nodeName }}
      nodeName: {{ .Values.nodeName }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}

      securityContext:
        fsGroup: 20  # dialout GID — allows access to /dev/tty* devices

      {{- if and .Values.persistence.enabled (not .Values.persistence.existingClaim) }}
      initContainers:
        - name: init-config
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              if [ ! -f /data/config.yaml ]; then
                echo "Seeding config.yaml from ConfigMap"
                cp /seed/config.yaml /data/config.yaml
              fi
          volumeMounts:
            - name: data
              mountPath: /data
            - name: seed-config
              mountPath: /seed
      {{- end }}

      containers:
        - name: serialmonitor
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args: ["--config", "/data/config.yaml"]
          ports:
            - containerPort: 8080
              name: http
          securityContext:
            {{- if .Values.privileged }}
            privileged: true
            {{- else }}
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            {{- end }}
          volumeMounts:
            - name: data
              mountPath: /data
            {{- if .Values.hostDev }}
            - name: host-dev
              mountPath: /dev
            {{- else }}
            {{- range .Values.devices }}
            - name: dev-{{ . | base | replace "." "-" }}
              mountPath: {{ . }}
            {{- end }}
            {{- end }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          livenessProbe:
            httpGet:
              path: /api/config
              port: http
            initialDelaySeconds: 5
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /api/config
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10

      volumes:
        - name: data
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ .Values.persistence.existingClaim | default (include "serialmonitor.fullname" .) }}
          {{- else }}
          emptyDir: {}
          {{- end }}
        {{- if and .Values.persistence.enabled (not .Values.persistence.existingClaim) }}
        - name: seed-config
          configMap:
            name: {{ include "serialmonitor.fullname" . }}-config
        {{- end }}
        {{- if .Values.hostDev }}
        - name: host-dev
          hostPath:
            path: /dev
        {{- else }}
        {{- range .Values.devices }}
        - name: dev-{{ . | base | replace "." "-" }}
          hostPath:
            path: {{ . }}
        {{- end }}
        {{- end }}
